name: Render LOGUS Pages

on:
  push:
    branches: [main]
    paths:
      - PROJECT.md
      - audits/**
      - scripts/validate.py
      - scripts/render.py
      - .github/workflows/render.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate LOGUS state
        run: python scripts/validate.py --mode auto

      - name: Render pages
        run: python scripts/render.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - id: deployment
        uses: actions/deploy-pages@v4
